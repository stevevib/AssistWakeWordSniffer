services:
  assist-sniffer:
    # Use 'build' here so it rebuilds the local image if you change C# code
    build:
      context: .
      dockerfile: AssistWakeWordSniffer/Dockerfile
    
    # Map the captures folder so .wav files appear on your Windows desktop
    volumes:
      - ./captures:/app/captures
    
    # Open the UDP port for your PowerShell FFmpeg bridge
    ports:
      - "1234:1234/udp"

    # Ensure the container restarts automatically if it crashes
    restart: always